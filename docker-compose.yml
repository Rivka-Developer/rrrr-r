services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: game_db
    ports:
      - "5432:5432"
    # הוספת בדיקת תקינות למסד הנתונים
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d game_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://user:password@db:5432/game_db?schema=public"
      NODE_TLS_REJECT_UNAUTHORIZED: "0" # מוודא שהגדרת הסינון תעבור גם כאן
   #  : הרצת מיגרציות ואז הפעלת ה Entry Point
    command: >
      sh -c "npx prisma db push --accept-data-loss && node main.js"
